  }
  .section h2{
    font-size:16px;
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .card-item{
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
  }
  .card-item:last-child{margin-bottom:0;}
  .card-item .row-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:600;
    font-size:14.5px;
  }
  .badge{
    display:inline-block;
    font-size:11px;
    padding:2px 8px;
    border-radius:20px;
    background:#f0eefe;
    color:var(--primary-dark);
    white-space:nowrap;
  }
  .badge.new{background:#e6f9f2;color:#00895b;}
  .badge.iter{background:#fff4e6;color:#e17055;}
  .card-item .meta{
    font-size:12.5px;
    color:var(--sub);
    margin-top:4px;
    line-height:1.6;
  }
  .card-item .desc{
    font-size:13px;
    margin-top:6px;
    line-height:1.6;
  }
  .card-item a{
    color:var(--primary);
    text-decoration:none;
  }
  .news-item{
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
  }
  .news-item:last-child{margin-bottom:0;}
  .news-item .news-title{
    display:flex;
    align-items:baseline;
    gap:6px;
    font-weight:600;
    font-size:14.5px;
    margin-bottom:8px;
  }
  .news-item .news-title .idx{
    color:var(--primary);
    font-weight:700;
  }
  .news-item .news-row{
    font-size:13px;
    line-height:1.7;
    margin-bottom:4px;
  }
  .news-item .news-row:last-child{margin-bottom:0;}
  .news-item .news-row .k{
    color:var(--primary-dark);
    font-weight:600;
  }
  .summary-box{
    margin-top:14px;
    background:#f8f7ff;
    border-radius:10px;
    padding:12px 14px;
  }
  .summary-box .label{
    font-size:12px;
    font-weight:600;
    color:var(--primary-dark);
    margin-bottom:6px;
  }
  .summary-box ul{
    margin:0;
    padding-left:18px;
    font-size:13px;
    line-height:1.8;
    color:var(--text);
  }
  .signal-block{
    margin-bottom:14px;
  }
  .signal-block .signal-label{
    font-size:12.5px;
    font-weight:600;
    color:var(--primary-dark);
    margin-bottom:6px;
  }
  .signal-block .signal-item{
    font-size:13px;
    line-height:1.7;
    margin-bottom:6px;
    padding-left:4px;
    border-left:3px solid var(--primary);
    padding-left:10px;
  }
  .footer-tip{
    margin:20px 16px 0;
    text-align:center;
    font-size:12.5px;
    color:var(--sub);
    padding:0 8px;
  }
  .empty{
    font-size:13px;
    color:var(--sub);
    text-align:center;
    padding:10px 0;

</head>

      {label:"监管落地", text:"《AI拟人化互动服务管理暂行办法》今日正式施行，将系统性改变国内AI对话产品的设计规范，「合规产品设计」将成为PM的标配能力要求"},
      {label:"端侧AI", text:"阶跃星辰AI手机+OpenAI AI音箱同周出现，「AI原生终端」从概念走向量产，端侧AI PM将是未来12个月需求增长最快的细分方向"},
      {label:"WAIC窗口", text:"2026世界人工智能大会7月17-20日上海召开，本周是年内AI行业发布密度最高的窗口，建议密切跟踪各目标公司动态用于丰富求职材料"},
      {label:"开源模型商业化", text:"DeepSeek峰谷定价+智谱港股A股双线上市，顶级开源模型正从「免费获客」转向「精细化商业运营」，商业化PM机会窗口打开"}
    ],
    job: [
      {label:"面试素材", text:"今天有两个优质面试案例：① MiniMax涨价风波——「用户信任管理和定价透明度」；② 阶跃星辰「协议接口调用」架构——「技术决策影响产品体验」"},
      {label:"差异化能力", text:"《AI拟人化办法》落地，「合规设计+用户知情权保护+未成年保护机制」成AI产品PM新必备能力，可作为简历亮点并在面试中主动展现"},
      {label:"目标公司优先级", text:"本周建议重点关注阶跃星辰（产品线全面扩张，招聘窗口大）和字节跳动（AI PM持续招募），智谱AI IPO推进期也是入职好时机"},
      {label:"求职节奏", text:"WAIC本周召开，各公司展台和发布活动是接触目标公司产品团队的好机会，建议有条件者参加现场活动，建立一手信息渠道"}
    ]
  }
};

function renderFunding(data){
  const rows = data.items.map(i => `
    <div class="card-item">
      <div class="row-title"><span>${i.company}</span><span class="badge">${i.round}</span></div>
      <div class="meta">💰 ${i.amount} ｜ 投资方：${i.investor}</div>
      <div class="desc">${i.type} · ${i.desc}</div>
    </div>
  `).join('') || '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>💰 一、融资动态</h2>
      ${rows}
      ${renderSummary('融资小结', data.summary)}
    </section>
  `;
}

function renderKeyNews(items){
  const rows = items.map((i, idx) => `
    <div class="news-item">
      <div class="news-title"><span class="idx">${idx+1}.</span><span>${i.event}</span></div>
      <div class="news-row"><span class="k">发生了什么：</span>${i.what}</div>
      <div class="news-row"><span class="k">为什么重要：</span>${i.why}</div>
      <div class="news-row"><span class="k">说明什么趋势：</span>${i.trend}</div>
      <div class="news-row"><span class="k">对求职的启示：</span>${i.implication}</div>
    </div>
  `).join('') || '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>🚀 二、重点资讯</h2>
      ${rows}
    </section>
  `;
}

function renderProduct(data){
  const rows = data.items.map(i => `
    <div class="card-item">
      <div class="row-title"><span>${i.company} · ${i.product}</span><span class="badge ${i.tag}">${i.tag==='new'?'🆕全新':'🔄迭代'}</span></div>
      <div class="meta">面向：${i.users}</div>
      <div class="desc">${i.highlight}</div>
      <div class="meta">来源：<a href="${i.url}" target="_blank">${i.source}</a></div>
    </div>
  `).join('') || '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>🚀 三、大公司新应用</h2>
      ${rows}
      ${renderSummary('产品小结', data.summary)}
    </section>
  `;
}

function renderJobs(data){
  const rows = data.items.map(i => `
    <div class="card-item">
      <div class="row-title"><span>${i.company}</span><span class="badge">${i.type}</span></div>
      <div class="desc">${i.title}</div>
      <div class="meta">核心要求：${i.req}</div>
      <div class="meta">薪资：${i.salary}</div>
    </div>
  `).join('') || '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>👔 四、职位与人才市场</h2>
      ${rows}
      ${renderSummary('职位小结', data.summary)}
    </section>
  `;
}

function renderCompetitors(data){
  const rows = data.items.map(i => `
    <div class="card-item">
      <div class="row-title"><span>${i.product}</span><span class="badge">${i.company}</span></div>
      <div class="meta">${i.type} · ${i.feature}</div>
      <div class="desc">用户反馈：${i.feedback}</div>
      <div class="desc">💡 ${i.insight}</div>
    </div>
  `).join('') || '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>🔍 五、产品拆解</h2>
      ${rows}
      ${renderSummary('竞品小结', data.summary)}
    </section>
  `;
}

function renderTargetCompanies(data){
  const rows = data.items.length
    ? data.items.map(i => `
      <div class="card-item">
        <div class="row-title"><span>${i.company}</span></div>
        <div class="desc">${i.update}</div>
      </div>
    `).join('')
    : '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>🏢 六、目标公司情报</h2>
      ${rows}
      ${renderSummary('公司情报小结', data.summary)}
    </section>
  `;
}

function renderSignals(data){
  const track = data.track.map(s => `
    <div class="signal-item"><b>${s.label}：</b><br>${s.text}</div>
  `).join('');
  const job = data.job.map(s => `
    <div class="signal-item"><b>${s.label}：</b><br>${s.text}</div>
  `).join('');
  return `
    <section class="section">
      <h2>🔗 七、综合信号与求职洞察</h2>
      <div class="signal-block">
        <div class="signal-label">赛道信号</div>
        ${track}
      </div>
      <div class="signal-block">
        <div class="signal-label">求职信号</div>
        ${job}
      </div>
    </section>
  `;
}

function renderSummary(label, list){
  if(!list || !list.length) return '';
  return `
    <div class="summary-box">
      <div class="label">${label}</div>
      <ul>${list.map(t => `<li>${t}</li>`).join('')}</ul>
    </div>
  `;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <header class="hero">
      <div class="date">📅 ${REPORT.date}</div>
      <h1>🎯 AI PM 求职情报日报</h1>
      <div class="tagline">求职信息助手 · 每日更新</div>
    </header>
    ${renderFunding(REPORT.funding)}
    ${renderKeyNews(REPORT.keyNews)}
    ${renderProduct(REPORT.product)}
    ${renderJobs(REPORT.jobs)}
    ${renderCompetitors(REPORT.competitors)}
    ${renderTargetCompanies(REPORT.targetCompanies)}
    ${renderSignals(REPORT.signals)}
    <div class="footer-tip">💡 有需求请联系：vx: DiQmoon | wmqdmn@qq.com</div>
  `;
}

render();
</script>
</body>
</html>
