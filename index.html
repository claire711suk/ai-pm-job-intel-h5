<style>
  :root{

    padding:18px 16px;

  }
  .section h2{
    font-size:16px;
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .card-item{
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
  }
  .card-item:last-child{margin-bottom:0;}
  .card-item .row-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:600;
    font-size:14.5px;
  }

    display:inline-block;

  }

  .badge.iter{background:#fff4e6;color:#e17055;}
  .card-item .meta{
    font-size:12.5px;
    color:var(--sub);
    margin-top:4px;
    line-height:1.6;
  }
  .card-item .desc{
    font-size:13px;
    margin-top:6px;
    line-height:1.6;
  }
  .card-item a{
    color:var(--primary);
    text-decoration:none;
  }
  .news-item{
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
  }
  .news-item:last-child{margin-bottom:0;}

    font-size:14.5px;
    margin-bottom:8px;
  }

    color:var(--primary);
    font-weight:700;
  }
  .news-item .news-row{
    font-size:13px;
    line-height:1.7;
    margin-bottom:4px;
  }
  .news-item .news-row:last-child{margin-bottom:0;}
  .news-item .news-row .k{
    color:var(--primary-dark);
    font-weight:600;
  }

    margin-top:14px;
    background:#f8f7ff;
    border-radius:10px;
    padding:12px 14px;
  }
  .summary-box .label{

    font-weight:600;
    color:var(--primary-dark);
    margin-bottom:6px;
  }
  .summary-box ul{
    margin:0;
    padding-left:18px;
    font-size:13px;
    line-height:1.8;
    color:var(--text);

    font-weight:600;
    color:var(--primary-dark);

    line-height:1.7;
    margin-bottom:6px;
    padding-left:4px;

  }
  .footer-tip{
    margin:20px 16px 0;
    text-align:center;
    font-size:12.5px;
    color:var(--sub);
    padding:0 8px;
  }
  .empty{
    font-size:13px;
    color:var(--sub);
    text-align:center;
    padding:10px 0;

</style>
</head>

function renderFunding(data){
  const rows = data.items.map(i => `
    <div class="card-item">
      <div class="row-title"><span>${i.company}</span><span class="badge">${i.round}</span></div>
      <div class="meta">💰 ${i.amount} ｜ 投资方：${i.investor}</div>
      <div class="desc">${i.type} · ${i.desc}</div>
    </div>
  `).join('') || '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>💰 一、融资动态</h2>
      ${rows}
      ${renderSummary('融资小结', data.summary)}
    </section>
  `;
}

function renderKeyNews(items){
  const rows = items.map((i, idx) => `
    <div class="news-item">
      <div class="news-title"><span class="idx">${idx+1}.</span><span>${i.event}</span></div>
      <div class="news-row"><span class="k">发生了什么：</span>${i.what}</div>
      <div class="news-row"><span class="k">为什么重要：</span>${i.why}</div>
      <div class="news-row"><span class="k">说明什么趋势：</span>${i.trend}</div>
      <div class="news-row"><span class="k">对求职的启示：</span>${i.implication}</div>
    </div>
  `).join('') || '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>🚀 二、重点资讯</h2>
      ${rows}
    </section>
  `;
}

function renderProduct(data){
  const rows = data.items.map(i => `

      <div class="row-title"><span>${i.company} · ${i.product}</span><span class="badge ${i.tag}">${i.tag==='new'?'🆕全新':'🔄迭代'}</span></div>
      <div class="meta">面向：${i.users}</div>
      <div class="desc">${i.highlight}</div>
      <div class="meta">来源：<a href="${i.url}" target="_blank">${i.source}</a></div>
    </div>
  `).join('') || '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>🚀 三、大公司新应用</h2>
      ${rows}
      ${renderSummary('产品小结', data.summary)}
    </section>
  `;
}

      <h2>🏢 六、目标公司情报</h2>

function renderSignals(data){
  const track = data.track.map(s => `
    <div class="signal-item"><b>${s.label}：</b><br>${s.text}</div>
  `).join('');
  const job = data.job.map(s => `
    <div class="signal-item"><b>${s.label}：</b><br>${s.text}</div>
  `).join('');
  return `
    <section class="section">
      <h2>🔗 七、综合信号与求职洞察</h2>
      <div class="signal-block">
        <div class="signal-label">赛道信号</div>
        ${track}
      </div>
      <div class="signal-block">
        <div class="signal-label">求职信号</div>
        ${job}
      </div>
    </section>
  `;
}

function renderSummary(label, list){
  if(!list || !list.length) return '';
  return `
    <div class="summary-box">
      <div class="label">${label}</div>
      <ul>${list.map(t => `<li>${t}</li>`).join('')}</ul>
    </div>
  `;
}
