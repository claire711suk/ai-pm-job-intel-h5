    align-items:center;
    gap:6px;
  }
  .card-item{

    padding:12px;
    margin-bottom:10px;
  }

  .badge.iter{background:#fff4e6;color:#e17055;}
  .card-item .meta{
    font-size:12.5px;
    color:var(--sub);
    margin-top:4px;
    line-height:1.6;
  }
  .card-item .desc{
    font-size:13px;
    margin-top:6px;
    line-height:1.6;
  }
  .card-item a{
    color:var(--primary);
    text-decoration:none;
  }
  .news-item{
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
  }

  }

    line-height:1.7;
    margin-bottom:4px;
  }

    color:var(--primary-dark);
    font-weight:600;
  }

    background:#f8f7ff;
    border-radius:10px;

    font-weight:600;
    color:var(--primary-dark);
    margin-bottom:6px;

    margin:0;
    padding-left:18px;
    font-size:13px;
    line-height:1.8;

  .empty{

function renderFunding(data){
  const rows = data.items.map(i => `
    <div class="card-item">
      <div class="row-title"><span>${i.company}</span><span class="badge">${i.round}</span></div>
      <div class="meta">💰 ${i.amount} ｜ 投资方：${i.investor}</div>
      <div class="desc">${i.type} · ${i.desc}</div>
    </div>
  `).join('') || '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>💰 一、融资动态</h2>
      ${rows}
      ${renderSummary('融资小结', data.summary)}
    </section>
  `;
}

function renderKeyNews(items){
  const rows = items.map((i, idx) => `
    <div class="news-item">
      <div class="news-title"><span class="idx">${idx+1}.</span><span>${i.event}</span></div>
      <div class="news-row"><span class="k">发生了什么：</span>${i.what}</div>
      <div class="news-row"><span class="k">为什么重要：</span>${i.why}</div>
      <div class="news-row"><span class="k">说明什么趋势：</span>${i.trend}</div>
      <div class="news-row"><span class="k">对求职的启示：</span>${i.implication}</div>
    </div>
  `).join('') || '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>🚀 二、重点资讯</h2>
      ${rows}
    </section>
  `;
}

function renderProduct(data){
  const rows = data.items.map(i => `
    <div class="card-item">
      <div class="row-title"><span>${i.company} · ${i.product}</span><span class="badge ${i.tag}">${i.tag==='new'?'🆕全新':'🔄迭代'}</span></div>
      <div class="meta">面向：${i.users}</div>
      <div class="desc">${i.highlight}</div>
      <div class="meta">来源：<a href="${i.url}" target="_blank">${i.source}</a></div>
    </div>
  `).join('') || '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>🚀 三、大公司新应用</h2>
      ${rows}
      ${renderSummary('产品小结', data.summary)}
    </section>
  `;
}

function renderJobs(data){
  const rows = data.items.map(i => `
    <div class="card-item">
      <div class="row-title"><span>${i.company}</span><span class="badge">${i.type}</span></div>
      <div class="desc">${i.title}</div>
      <div class="meta">核心要求：${i.req}</div>
      <div class="meta">薪资：${i.salary}</div>
    </div>
  `).join('') || '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>👔 四、职位与人才市场</h2>
      ${rows}
      ${renderSummary('职位小结', data.summary)}

  `;
}

      <div class="meta">${i.type} · ${i.feature}</div>
      <div class="desc">用户反馈：${i.feedback}</div>

function renderTargetCompanies(data){
  const rows = data.items.length
    ? data.items.map(i => `
      <div class="card-item">
        <div class="row-title"><span>${i.company}</span></div>
        <div class="desc">${i.update}</div>
      </div>
    `).join('')
    : '<div class="empty">本周暂无显著动态</div>';
  return `
    <section class="section">
      <h2>🏢 六、目标公司情报</h2>
      ${rows}
      ${renderSummary('公司情报小结', data.summary)}
    </section>
  `;
}

function renderSignals(data){
  const track = data.track.map(s => `
    <div class="signal-item"><b>${s.label}：</b><br>${s.text}</div>
  `).join('');
  const job = data.job.map(s => `
    <div class="signal-item"><b>${s.label}：</b><br>${s.text}</div>
  `).join('');
  return `
    <section class="section">
      <h2>🔗 七、综合信号与求职洞察</h2>
      <div class="signal-block">
        <div class="signal-label">赛道信号</div>
        ${track}
      </div>
      <div class="signal-block">
        <div class="signal-label">求职信号</div>
        ${job}
      </div>
    </section>
  `;
}

function renderSummary(label, list){
  if(!list || !list.length) return '';
  return `
    <div class="summary-box">
      <div class="label">${label}</div>
      <ul>${list.map(t => `<li>${t}</li>`).join('')}</ul>
    </div>
  `;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <header class="hero">
      <div class="date">📅 ${REPORT.date}</div>
      <h1>🎯 AI PM 求职情报日报</h1>
      <div class="tagline">求职信息助手 · 每日更新</div>
    </header>
    ${renderFunding(REPORT.funding)}
    ${renderKeyNews(REPORT.keyNews)}
    ${renderProduct(REPORT.product)}
    ${renderJobs(REPORT.jobs)}
    ${renderCompetitors(REPORT.competitors)}
    ${renderTargetCompanies(REPORT.targetCompanies)}
    ${renderSignals(REPORT.signals)}
    <div class="footer-tip">💡 如需深入了解某条情报，告诉我"帮我展开XX公司"或"分析XX产品"，我会单独搜索。</div>
  `;
}

render();
